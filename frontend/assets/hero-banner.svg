<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" fill="none" role="img" aria-label="World Cup 2026 — 26 with championship trophy">
  <defs>
    <clipPath id="frame"><rect width="1200" height="300"/></clipPath>
    <linearGradient id="rb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff2d2d"/>
      <stop offset="0.2" stop-color="#ff8a00"/>
      <stop offset="0.4" stop-color="#ffd400"/>
      <stop offset="0.6" stop-color="#22c55e"/>
      <stop offset="0.8" stop-color="#2979ff"/>
      <stop offset="1" stop-color="#8e2de2"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffd700" stop-opacity="0.3"/>
      <stop offset="0.6" stop-color="#ffd700" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe873"/>
      <stop offset="0.5" stop-color="#ffd700"/>
      <stop offset="1" stop-color="#daa520"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="300" fill="#000000"/>

    <!-- signature rainbow sweep — passes behind the emblem -->
    <g>
      <rect x="0" y="0" width="80" height="300" fill="url(#rb)"/>
      <animateTransform attributeName="transform" type="translate" from="-80 0" to="1200 0" dur="2s" calcMode="spline" keyTimes="0;1" keySplines="0.42 0 0.58 1" repeatCount="indefinite"/>
    </g>

    <ellipse cx="600" cy="150" rx="132" ry="126" fill="url(#halo)"/>

    <g fill="#ffffff" font-family="'Barlow Condensed','Arial Narrow',Arial,sans-serif" font-weight="800" font-size="240" text-anchor="middle">
      <text x="458" y="218">2</text>
      <text x="742" y="218">6</text>
    </g>

    <g transform="translate(600 150)">
      <!-- cup bowl -->
      <path fill="url(#gold)" stroke="#8a6d1a" stroke-width="1"
        d="M-46,-58 L46,-58 C44,-22 24,2 0,4 C-24,2 -44,-22 -46,-58 Z"/>
      <ellipse cx="0" cy="-58" rx="46" ry="7" fill="#ffe873" stroke="#8a6d1a" stroke-width="1"/>
      <!-- handles -->
      <g fill="none" stroke="url(#gold)" stroke-width="8" stroke-linecap="round">
        <path d="M-46,-52 C-68,-48 -68,-14 -48,-16"/>
        <path d="M46,-52 C68,-48 68,-14 48,-16"/>
      </g>
      <!-- stem + pedestal -->
      <path fill="url(#gold)" stroke="#8a6d1a" stroke-width="1"
        d="M-7,4 L7,4 L6,30 L-6,30 Z"/>
      <path fill="url(#gold)" stroke="#8a6d1a" stroke-width="1"
        d="M-16,30 L16,30 L22,48 L-22,48 Z"/>
      <path fill="url(#gold)" stroke="#8a6d1a" stroke-width="1"
        d="M-30,48 L30,48 L30,66 L-30,66 Z"/>
      <!-- metallic sheen (subtle shimmer) -->
      <path fill="#fff3b0" d="M-34,-52 C-40,-24 -22,-4 -10,2 L-5,-1 C-18,-8 -34,-26 -30,-52 Z">
        <animate attributeName="opacity" values="0.4;0.62;0.4" dur="1.4s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
</svg>
