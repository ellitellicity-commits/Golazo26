<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200" fill="none" role="img" aria-label="Host nations of World Cup 2026: United States, Mexico, Canada">
  <defs>
    <clipPath id="panel2"><rect width="1200" height="200" rx="18"/></clipPath>
    <filter id="drop" x="-40%" y="-40%" width="180%" height="200%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <path id="shield" d="M-58,-66 L58,-66 L58,4 C58,42 32,64 0,78 C-32,64 -58,42 -58,4 Z"/>
    <path id="star" d="M0,-9 2.12,-2.91 8.56,-2.78 3.42,1.11 5.29,7.28 0,3.6 -5.29,7.28 -3.42,1.11 -8.56,-2.78 -2.12,-2.91 Z"/>
    <g id="ball">
      <circle r="15" fill="#f6f6f6" stroke="#0a0a0a" stroke-width="1.6"/>
      <polygon points="0,-5.5 5.2,-1.7 3.2,4.4 -3.2,4.4 -5.2,-1.7" fill="#0a0a0a"/>
      <g stroke="#0a0a0a" stroke-width="1.4">
        <line x1="0" y1="-5.5" x2="0" y2="-14"/>
        <line x1="5.2" y1="-1.7" x2="13" y2="-4.3"/>
        <line x1="3.2" y1="4.4" x2="8" y2="11"/>
        <line x1="-3.2" y1="4.4" x2="-8" y2="11"/>
        <line x1="-5.2" y1="-1.7" x2="-13" y2="-4.3"/>
      </g>
    </g>
  </defs>

  <g clip-path="url(#panel2)">
    <rect width="1200" height="200" fill="#0a0a0a"/>

    <!-- USA: blue field, white stars -->
    <g transform="translate(250 86)" filter="url(#drop)">
      <g>
        <use href="#shield" fill="#217fd8" stroke="#f6f6f6" stroke-width="2.5"/>
        <ellipse cx="0" cy="-40" rx="46" ry="15" fill="#ffffff" opacity="0.14"/>
        <g fill="#f6f6f6">
          <use href="#star" transform="translate(0 -34) scale(0.85)"/>
          <use href="#star" transform="translate(-26 -14) scale(0.75)"/>
          <use href="#star" transform="translate(26 -14) scale(0.75)"/>
          <use href="#star" transform="translate(-15 6) scale(0.65)"/>
          <use href="#star" transform="translate(15 6) scale(0.65)"/>
        </g>
        <use href="#ball" transform="translate(0 40)"/>
        <animateTransform attributeName="transform" type="rotate" values="-5;5;-5" dur="3.4s" begin="0s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/>
      </g>
    </g>

    <!-- Mexico: green field, eagle -->
    <g transform="translate(600 86)" filter="url(#drop)">
      <g>
        <use href="#shield" fill="#00a24f" stroke="#f6f6f6" stroke-width="2.5"/>
        <ellipse cx="0" cy="-40" rx="46" ry="15" fill="#ffffff" opacity="0.14"/>
        <g fill="#f6f6f6" transform="translate(0 -18) scale(0.92)">
          <circle cx="0" cy="-24" r="6"/>
          <polygon points="4,-24 16,-27 6,-19" fill="#e7bf4a"/>
          <path d="M0,-18 C-4,-24 -12,-24 -14,-17 C-26,-22 -38,-14 -40,-2 C-28,-8 -18,-4 -10,2 C-6,8 -3,14 0,24 C3,14 6,8 10,2 C18,-4 28,-8 40,-2 C38,-14 26,-22 14,-17 C12,-24 4,-24 0,-18 Z"/>
        </g>
        <use href="#ball" transform="translate(0 42)"/>
        <animateTransform attributeName="transform" type="rotate" values="-5;5;-5" dur="3.4s" begin="0.55s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/>
      </g>
    </g>

    <!-- Canada: red field, maple leaf -->
    <g transform="translate(950 86)" filter="url(#drop)">
      <g>
        <use href="#shield" fill="#cc272e" stroke="#f6f6f6" stroke-width="2.5"/>
        <ellipse cx="0" cy="-40" rx="46" ry="15" fill="#ffffff" opacity="0.14"/>
        <path fill="#f6f6f6" transform="translate(0 -16) scale(0.92)"
          d="M0,-38 L5,-16 L22,-24 L15,-5 L34,-2 L21,9 L30,28 L11,22 L9,40 L0,31 L-9,40 L-11,22 L-30,28 L-21,9 L-34,-2 L-15,-5 L-22,-24 L-5,-16 Z"/>
        <use href="#ball" transform="translate(0 44)"/>
        <animateTransform attributeName="transform" type="rotate" values="-5;5;-5" dur="3.4s" begin="1.1s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/>
      </g>
    </g>

    <text x="600" y="192" font-family="'Barlow Condensed','Arial Narrow',Arial,sans-serif" font-weight="700" font-size="24" letter-spacing="8" text-anchor="middle" fill="#a8a8a8">FIFA WORLD CUP 2026</text>
  </g>
</svg>
