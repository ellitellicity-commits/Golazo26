<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200" fill="none" role="img" aria-label="World Cup 2026 host nations">
  <defs>
    <filter id="drop" x="-40%" y="-40%" width="180%" height="200%">
      <feDropShadow dx="3" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <path id="shield" d="M-72,-72 L72,-72 L72,-18 L0,72 L-72,-18 Z"/>
    <path id="st" d="M0,-10 2.35,-3.24 9.51,-3.09 3.8,1.24 5.88,8.09 0,4 -5.88,8.09 -3.8,1.24 -9.51,-3.09 -2.35,-3.24 Z"/>
    <g id="ball">
      <circle r="15" fill="#ffffff" stroke="#0a0a0a" stroke-width="1.5"/>
      <polygon points="0,-5.5 5.2,-1.7 3.2,4.4 -3.2,4.4 -5.2,-1.7" fill="#0a0a0a"/>
      <g stroke="#0a0a0a" stroke-width="1.3">
        <line x1="0" y1="-5.5" x2="0" y2="-14"/>
        <line x1="5.2" y1="-1.7" x2="13" y2="-4.3"/>
        <line x1="3.2" y1="4.4" x2="8" y2="11"/>
        <line x1="-3.2" y1="4.4" x2="-8" y2="11"/>
        <line x1="-5.2" y1="-1.7" x2="-13" y2="-4.3"/>
      </g>
    </g>
  </defs>

  <rect width="1200" height="200" fill="#000000"/>

  <!-- USA — blue, star quincunx -->
  <g transform="translate(320 66)" filter="url(#drop)">
    <g>
      <use href="#shield" fill="#1e40af" stroke="#ffffff" stroke-width="3"/>
      <ellipse cx="0" cy="-52" rx="58" ry="16" fill="#ffffff" opacity="0.1"/>
      <g fill="#ffffff">
        <use href="#st" transform="translate(0 -30)"/>
        <use href="#st" transform="translate(-28 -48) scale(0.8)"/>
        <use href="#st" transform="translate(28 -48) scale(0.8)"/>
        <use href="#st" transform="translate(-28 -12) scale(0.8)"/>
        <use href="#st" transform="translate(28 -12) scale(0.8)"/>
      </g>
      <use href="#ball" transform="translate(0 30)"/>
      <animateTransform attributeName="transform" type="rotate" values="-4;4;-4" dur="3.5s" begin="0s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- Mexico — green, stylized leaf -->
  <g transform="translate(600 66)" filter="url(#drop)">
    <g>
      <use href="#shield" fill="#15803d" stroke="#ffffff" stroke-width="3"/>
      <ellipse cx="0" cy="-52" rx="58" ry="16" fill="#ffffff" opacity="0.1"/>
      <path fill="#ffffff" transform="translate(0 -28)"
        d="M0,-26 L7,-8 L22,-13 L12,2 L20,17 L4,13 L0,28 L-4,13 L-20,17 L-12,2 L-22,-13 L-7,-8 Z"/>
      <use href="#ball" transform="translate(0 30)"/>
      <animateTransform attributeName="transform" type="rotate" values="-4;4;-4" dur="3.5s" begin="0.8s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- Canada — red, starburst -->
  <g transform="translate(880 66)" filter="url(#drop)">
    <g>
      <use href="#shield" fill="#dc2626" stroke="#ffffff" stroke-width="3"/>
      <ellipse cx="0" cy="-52" rx="58" ry="16" fill="#ffffff" opacity="0.1"/>
      <path fill="#ffffff" transform="translate(0 -28)"
        d="M0,-24 3.75,-9.06 16.97,-16.97 9.06,-3.75 24,0 9.06,3.75 16.97,16.97 3.75,9.06 0,24 -3.75,9.06 -16.97,16.97 -9.06,3.75 -24,0 -9.06,-3.75 -16.97,-16.97 -3.75,-9.06 Z"/>
      <use href="#ball" transform="translate(0 30)"/>
      <animateTransform attributeName="transform" type="rotate" values="-4;4;-4" dur="3.5s" begin="1.6s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" repeatCount="indefinite"/>
    </g>
  </g>

  <text x="600" y="190" font-family="'Barlow Condensed','Arial Narrow',Arial,sans-serif" font-weight="800" font-size="30" letter-spacing="10" text-anchor="middle" fill="#a0a0a0">FIFA WORLD CUP 2026</text>
</svg>
